version: "3.8"

services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: http://app:8000
    ports:
      - "3000:3000"
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://app:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
