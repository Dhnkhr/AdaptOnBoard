version: "3.8"

services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: https://api.yourdomain.com
    image: adaptonboard:latest
    container_name: adaptonboard-prod
    ports:
      - "3000:3000"
      - "8000:8000"
    env_file:
      - .env.prod
    environment:
      - NEXT_PUBLIC_API_URL=https://api.yourdomain.com
      - ENVIRONMENT=production
    restart: always
    networks:
      - adaptonboard-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G

networks:
  adaptonboard-network:
    driver: bridge
